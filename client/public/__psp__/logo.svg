<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">PSP Logo</title>
  <desc id="desc">Simple PSP wordmark for intro splash screen.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7ff" />
      <stop offset="100%" stop-color="#c8d1ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="820" height="260" fill="none" />
  <g fill="url(#g)" filter="url(#glow)" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="18">
    <text x="40" y="170" font-size="150">PSP</text>
  </g>
</svg>
